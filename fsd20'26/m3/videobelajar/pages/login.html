    <header class="navbar">
      <div class="container nav-container">
        <div class="logo">
          <a href="../index.html"
            ><img src="../images/logo.png" alt="Logo videobelajar"
          /></a>
        </div>

        <!-- <button class="burger-menu" id="burger-btn">&#9776;</button> -->

        <div class="nav-right" id="nav-menu">

          <!-- <div class="profile-avatar">

          </div> -->
        </div>
      </div>
    </header>

    <!-- Main Container -->
    <main class="page-container">
      <div class="login-card">
        <header class="card-header">
          <h1>Masuk ke Akun</h1>
          <p>Yuk, lanjutin belajarmu di videobelajar.</p>
        </header>

        <form action="#" method="POST" class="login-form">
          <!-- Email Field -->
          <div class="input-group">
            <label for="email">E-Mail <span class="required">*</span></label>
            <input style="font-family: DM Sans; font-size: 14px; font-weight: 400;"
              type="email"
              id="email"
              name="email"
              value=""
              required
            />
          </div>

          <!-- Password Field -->
          <div class="input-group">
            <label for="password"
              >Kata Sandi <span class="required">*</span></label
            >
            <div class="password-wrapper">
              <input style="font-family: DM Sans; font-size: 14px; font-weight: 400;"
                type="password"
                id="password"
                name="password"
                value=""
                required
              />
              <!-- Visibility Icon Wrapper -->
              <button
                type="button"
                class="toggle-password"
                aria-label="Toggle password visibility"
              >
                <svg
                  xmlns="http://w3.org"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="eye-icon"
                >
                  <path
                    d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
                  ></path>
                  <line x1="1" y1="1" x2="23" y2="23"></line>
                </svg>
              </button>
            </div>
          </div>

          <!-- Forgot Password -->
          <div class="forgot-container">
            <a href="#" class="forgot-link">Lupa Password</a>
          </div>

          <!-- Action Buttons -->
          <div class="action-buttons">
            <button type="submit" class="btn btn-primary">Masuk</button>
            <button type="submit" class="btn btn-secondary">Daftar</button>
          </div>
        </form>

        <!-- Divider Line -->
        <div class="divider">
          <span>atau</span>
        </div>

        <!-- Social Button -->
        <div class="social-container">
          <button class="btn-google">
            <img src="../images/google-icon.png" alt="Google Logo" />
            Masuk dengan Google
          </button>
        </div>
      </div>
    </main>
  </body>
